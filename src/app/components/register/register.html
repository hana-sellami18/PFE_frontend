<div class="auth-wrapper">
  <div class="deco-circle top-left"></div>
  <div class="deco-circle bottom-right"></div>
  <div class="deco-circle mid-right"></div>

  <div class="auth-card">

    <div class="auth-logo">
      <img src="assets/logo-asm.png" alt="ASM Logo" />
    </div>

    <div class="auth-header">
      <h1 class="auth-title">Créer un compte</h1>
      <p class="auth-subtitle">Rejoignez l'espace RH ASM</p>
      <div class="auth-divider-accent"></div>
    </div>

    <div class="auth-field">
      <label class="auth-label">Nom complet</label>
      <div class="auth-input-wrapper" [class.has-error]="errors.nomComplet">
        <div class="auth-input-icon-box blue">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <input type="text" [(ngModel)]="regData.nomComplet"
               placeholder="Ex: Ahmed Ben Ali" class="auth-input"
               (input)="errors.nomComplet = ''" />
      </div>
      <div class="auth-error" *ngIf="errors.nomComplet">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errors.nomComplet }}
      </div>
    </div>

    <div class="auth-field">
      <label class="auth-label">Adresse email</label>
      <div class="auth-input-wrapper" [class.has-error]="errors.email">
        <div class="auth-input-icon-box blue">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <input type="email" [(ngModel)]="regData.email"
               placeholder="exemple@entreprise.com" class="auth-input"
               (input)="errors.email = ''" />
      </div>
      <div class="auth-error" *ngIf="errors.email">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errors.email }}
      </div>
    </div>

    <div class="auth-field">
      <label class="auth-label">
        Téléphone <span class="auth-optional">(optionnel)</span>
      </label>
      <div class="auth-input-wrapper">
        <div class="auth-input-icon-box green">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.67A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
        </div>
        <input type="tel" [(ngModel)]="regData.telephone"
               placeholder="+216 XX XXX XXX" class="auth-input" />
      </div>
    </div>

    <div class="auth-field">
      <label class="auth-label">Date de naissance</label>
      <div class="auth-input-wrapper">
        <div class="auth-input-icon-box orange">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#F5821F" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <input type="date" [(ngModel)]="regData.dateNaissance"
               class="auth-input auth-input-date" />
      </div>
    </div>

    <div class="auth-field">
      <label class="auth-label">Mot de passe</label>
      <div class="auth-input-wrapper" [class.has-error]="errors.password">
        <div class="auth-input-icon-box purple">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </div>
        <input [type]="showPassword ? 'text' : 'password'"
               [(ngModel)]="regData.password"
               placeholder="••••••••" class="auth-input"
               (input)="errors.password = ''" />
        <button class="auth-eye-btn" type="button" (click)="showPassword = !showPassword">
          <!-- caché → œil barré -->
          <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round">
            <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
          <!-- visible → œil normal -->
          <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="auth-error" *ngIf="errors.password">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errors.password }}
      </div>
    </div>

    <button class="auth-btn" (click)="onRegister()" [disabled]="isLoading">
      <span class="auth-btn-spinner" *ngIf="isLoading"></span>
      <ng-container *ngIf="!isLoading">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/>
          <line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
        Créer mon compte
      </ng-container>
    </button>

    <p class="auth-footer">
      Déjà un compte ?
      <span class="auth-link" (click)="goToLogin()">Se connecter</span>
    </p>

  </div>
</div>
