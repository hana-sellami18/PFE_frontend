<div class="auth-wrapper">
  <div class="deco-circle top-left"></div>
  <div class="deco-circle bottom-right"></div>
  <div class="deco-circle mid-right"></div>

  <div class="auth-card">

    <div class="auth-logo">
      <img src="assets/logo-asm.png" alt="ASM Logo" />
    </div>

    <div class="auth-header">
      <h1 class="auth-title">Connexion</h1>
      <p class="auth-subtitle">Connexion à votre compte</p>
      <div class="auth-divider-accent"></div>
    </div>

    <div class="auth-field">
      <label class="auth-label">Adresse email</label>
      <div class="auth-input-wrapper" [class.has-error]="emailError">
        <div class="auth-input-icon-box blue">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2" stroke-linecap="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>
        <input
          type="email"
          name="email"
          [(ngModel)]="loginData.email"
          placeholder="votre@email.com"
          class="auth-input"
          (input)="emailError = ''"
        />
      </div>
      <div class="auth-error" *ngIf="emailError">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ emailError }}
      </div>
    </div>

    <div class="auth-field">
      <label class="auth-label">Mot de passe</label>
      <div class="auth-input-wrapper" [class.has-error]="passwordError">
        <div class="auth-input-icon-box purple">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </div>
        <input
          [type]="showPassword ? 'text' : 'password'"
          name="password"
          [(ngModel)]="loginData.password"
          placeholder="••••••••"
          class="auth-input"
          (input)="passwordError = ''"
        />
        <button class="auth-eye-btn" type="button" (click)="showPassword = !showPassword">
          <!-- caché → œil barré -->
          <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round">
            <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
          <!-- visible → œil normal -->
          <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="auth-error" *ngIf="passwordError">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ passwordError }}
      </div>
    </div>

    <button class="auth-btn" (click)="onLogin()" [disabled]="isLoading">
      <span class="auth-btn-spinner" *ngIf="isLoading"></span>
      <ng-container *ngIf="!isLoading">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
          <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Se connecter
      </ng-container>
    </button>

    <p class="auth-footer">
      Pas encore de compte ?
      <span class="auth-link" (click)="goToRegister()">Créer un compte</span>
    </p>

  </div>
</div>
